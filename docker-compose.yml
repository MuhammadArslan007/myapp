version: "3.9"

services:
  backend:
    build: ./backend
    container_name: portfolio_backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: portfolio_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/myapp.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/build:/var/www/myapp/frontend/build
    depends_on:
      - backend
    restart: unless-stopped
