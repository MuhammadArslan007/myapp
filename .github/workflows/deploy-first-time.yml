name: Deploy First Time

on:
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Test Backend
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pytest tests/

    - name: Test Frontend
      run: |
        cd frontend
        npm install
        npm test -- --run

    - name: Setup VM
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          sudo apt update
          sudo apt install -y python3 python3-pip python3-venv nodejs npm nginx git
          sudo mkdir -p /var/www/myapp
          sudo chown -R ${{ secrets.SSH_USER }}:${{ secrets.SSH_USER }} /var/www/myapp
          git clone https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /var/www/myapp
          sudo usermod -a -G www-data ${{ secrets.SSH_USER }}
          sudo chown -R ${{ secrets.SSH_USER }}:www-data /var/www/myapp
          # Backend setup
          cd /var/www/myapp/backend
          python3 -m venv venv
          source venv/bin/activate
          pip install -r requirements.txt
          # Frontend setup
          cd /var/www/myapp/frontend
          npm install
          chmod +x node_modules/.bin/vite
          npm run build
          # Nginx setup
          sudo cp /var/www/myapp/nginx/myapp.conf /etc/nginx/sites-available/myapp
          sudo ln -sf /etc/nginx/sites-available/myapp /etc/nginx/sites-enabled/
          sudo nginx -t
          sudo systemctl reload nginx
          # Backend service
          sudo tee /etc/systemd/system/myapp-backend.service > /dev/null <<EOF
          [Unit]
          Description=MyApp Backend
          After=network.target
          [Service]
          User=www-data
          Group=www-data
          WorkingDirectory=/var/www/myapp/backend
          ExecStart=/var/www/myapp/backend/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port 8000
          Restart=always
          [Install]
          WantedBy=multi-user.target
          EOF
          sudo systemctl daemon-reload
          sudo systemctl enable myapp-backend
          sudo systemctl start myapp-backend